version: "3.9"

# Fichier UNIQUE à la racine du projet : regroupe et lance tout
# (backend, bases de données, dashboard, broker MQTT, Node-RED).
#
# Lancer avec (depuis la racine du projet, PAS depuis api/) :
#   docker compose up -d --build

services:

  # ================= BACKEND (Dembélé) =================

  # ---------- MongoDB : Réplica Set 3 nœuds ----------
  mongo1:
    image: mongo:4.4
    container_name: mongo1
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo1_data:/data/db
    networks:
      - smart_fishing_net

  mongo2:
    image: mongo:4.4
    container_name: mongo2
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27018:27017"
    volumes:
      - mongo2_data:/data/db
    networks:
      - smart_fishing_net

  mongo3:
    image: mongo:4.4
    container_name: mongo3
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27019:27017"
    volumes:
      - mongo3_data:/data/db
    networks:
      - smart_fishing_net

  # ---------- InfluxDB ----------
  influxdb:
    image: influxdb:2.7
    container_name: influxdb1
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: bdgl2026
      DOCKER_INFLUXDB_INIT_ORG: smart_fishing
      DOCKER_INFLUXDB_INIT_BUCKET: telemetrie_peche
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: BhvMTAanAUCzy3KTXxdJ14CDZpT1dJCzvALvHxl_q5SvfnpB3O30n5q34DoV8LPFlmRUuUoscHUxYbv1hZxjqw==
    networks:
      - smart_fishing_net

  # ---------- Conteneur outils : pour lancer les scripts Python ----------
  tools:
    build:
      context: ./api
      dockerfile: Dockerfile.tools
    container_name: sf_tools
    volumes:
      - ./api:/app
    working_dir: /app
    command: ["tail", "-f", "/dev/null"]
    env_file:
      - ./api/.env
    networks:
      - smart_fishing_net
    depends_on:
      - mongo1
      - mongo2
      - mongo3
      - influxdb

  # ---------- Redis : master + 2 replicas (IP statiques) ----------
  redis-master:
    image: redis:7.2
    container_name: redis-master
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      smart_fishing_net:
        ipv4_address: 172.28.0.10

  redis-replica1:
    image: redis:7.2
    container_name: redis-replica1
    command: ["redis-server", "--replicaof", "172.28.0.10", "6379"]
    depends_on:
      - redis-master
    networks:
      smart_fishing_net:
        ipv4_address: 172.28.0.11

  redis-replica2:
    image: redis:7.2
    container_name: redis-replica2
    command: ["redis-server", "--replicaof", "172.28.0.10", "6379"]
    depends_on:
      - redis-master
    networks:
      smart_fishing_net:
        ipv4_address: 172.28.0.12

  # ---------- Redis Sentinel : 3 nœuds, quorum = 2 ----------
  sentinel1:
    image: redis:7.2
    container_name: sentinel1
    command: ["redis-sentinel", "/etc/sentinel/sentinel.conf"]
    volumes:
      - ./api/sentinel/node1:/etc/sentinel
    depends_on:
      - redis-master
      - redis-replica1
      - redis-replica2
    networks:
      - smart_fishing_net

  sentinel2:
    image: redis:7.2
    container_name: sentinel2
    command: ["redis-sentinel", "/etc/sentinel/sentinel.conf"]
    volumes:
      - ./api/sentinel/node2:/etc/sentinel
    depends_on:
      - redis-master
      - redis-replica1
      - redis-replica2
    networks:
      - smart_fishing_net

  sentinel3:
    image: redis:7.2
    container_name: sentinel3
    command: ["redis-sentinel", "/etc/sentinel/sentinel.conf"]
    volumes:
      - ./api/sentinel/node3:/etc/sentinel
    depends_on:
      - redis-master
      - redis-replica1
      - redis-replica2
    networks:
      - smart_fishing_net

  # ---------- API FastAPI ----------
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.api
    container_name: sf_api
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    env_file:
      - ./api/.env
    depends_on:
      - mongo1
      - mongo2
      - mongo3
      - influxdb
      - redis-master
      - sentinel1
      - sentinel2
      - sentinel3
    networks:
      - smart_fishing_net

  # ================= FRONTEND (Kouaho) =================

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: sf_dashboard
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000/ws
    depends_on:
      - api
    networks:
      - smart_fishing_net

  # ================= IOT (broker + Node-RED) =================

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: iot_mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./broker/mosquitto_vul.conf:/mosquitto/config/mosquitto.conf
    networks:
      - smart_fishing_net

  mosquitto-secure:
    image: eclipse-mosquitto:2
    container_name: iot_mosquitto_secure
    ports:
      - "8883:8883"
    volumes:
      - ./broker/mosquitto_tls.conf:/mosquitto/config/mosquitto.conf
      - ./certs/ca.crt:/etc/mosquitto/ca.crt
      - ./certs/server.crt:/etc/mosquitto/server.crt
      - ./certs/server.key:/etc/mosquitto/server.key
      - ./conf/passwd:/etc/mosquitto/passwd
    networks:
      - smart_fishing_net

  node-red:
    image: nodered/node-red:3.1
    container_name: iot_node_red
    user: "0:0"
    ports:
      - "1880:1880"
    volumes:
      - ./node-red-data:/data
    depends_on:
      - mosquitto
      - mosquitto-secure
      - api
    networks:
      - smart_fishing_net
  
  # ================= MONITORING =================

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: sf_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - api
    networks:
      - smart_fishing_net

  grafana:
    image: grafana/grafana:10.2.0
    container_name: sf_grafana
    restart: unless-stopped
    ports:
      - "3001:3000" # Mappé sur 3001 car votre "dashboard" utilise déjà le port 3000 !
    volumes:
      - grafana_data:/var/lib/grafana
      # Injection automatique de la source de données Prometheus configurée à l'Étape 2
      - ./prometheus/datasources:/etc/grafana/provisioning/datasources
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # Mot de passe administrateur par défaut
    depends_on:
      - prometheus
    networks:
      - smart_fishing_net

volumes:
  mongo1_data:
  mongo2_data:
  mongo3_data:
  influxdb_data:
  prometheus_data: # <-- Ajouté pour Prometheus
  grafana_data:    # <-- Ajouté pour Grafana

networks:
  smart_fishing_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16