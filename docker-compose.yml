services:
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
        - VITE_WS_URL=http://localhost:8000
    ports:
      - "8080:80"          # <-- deplace : 3000 est reserve a Grafana (URL codee en dur dans Metrics.jsx)
    depends_on:
      - api
      - grafana
    networks:
      - iot-network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=sf-demo-token-KOUAHO-2026
      - INFLUX_ORG=smart-fishing
      - INFLUX_BUCKET=fishing
    depends_on:
      - influxdb
    networks:
      - iot-network

  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUX_ADMIN_PASSWORD:-admin12345}
      - DOCKER_INFLUXDB_INIT_ORG=smart-fishing
      - DOCKER_INFLUXDB_INIT_BUCKET=fishing
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUX_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - iot-network

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api
    networks:
      - iot-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"        # <-- reste ici, car Metrics.jsx pointe vers localhost:3000
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - INFLUX_TOKEN=${INFLUX_TOKEN}
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/etc/grafana/provisioning/dashboards/exported
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - influxdb
    networks:
      - iot-network

networks:
  iot-network:
    driver: bridge

volumes:
  influxdb-data:
  grafana-data: