# Nginx Load Balancer — SMART-FISHING
# Répartit la charge entre 3 instances API FastAPI

events {
    worker_connections 1024;
}

http {
    upstream api_servers {
        # Stratégie : round-robin (répartition équitable)
        server 127.0.0.1:8001;
        server 127.0.0.1:8002;
        server 127.0.0.1:8003;

        # Health check : vérifie si les instances sont vivantes
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://api_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Endpoint de santé pour vérifier Nginx
        location /health {
            return 200 "OK";
            add_header Content-Type text/plain;
        }
    }
}
