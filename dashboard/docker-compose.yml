services:
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000/ws
    networks:
      - smart_fishing_net

networks:
  smart_fishing_net:
    external: true
    name: smart_fishing_net