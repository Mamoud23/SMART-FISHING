apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: smart-fishing
      defaultBucket: fishing
      httpHeaderName1: "Authorization"
    secureJsonData:
      httpHeaderValue1: "Token ${INFLUX_TOKEN}"
    editable: true
