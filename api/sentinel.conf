# Depuis C:\Users\dyaco\SMART-FISHING\backend\
===========

port 26379

# Surveillance du master
sentinel monitor mymaster 172.28.0.10 6379 2

# Paramètres beaucoup plus tolérants
sentinel down-after-milliseconds mymaster 90000     # 90 secondes
sentinel failover-timeout mymaster 300000           # 5 minutes
sentinel parallel-syncs mymaster 1

# Réduire la sensibilité
sentinel ping-period 2000
sentinel config-epoch mymaster 0

# Performance
protected-mode no
loglevel notice

# Optionnel : aider avec les annonces dans Docker
# sentinel announce-ip 172.28.0.7
# sentinel announce-port 26379
