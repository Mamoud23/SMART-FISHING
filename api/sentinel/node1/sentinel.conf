port 26379

# Surveille le master via son IP FIXE (pas un nom DNS, qui disparaît quand
# le conteneur est arrêté et bloque Sentinel avec une résolution qui traîne -> tilt).
sentinel monitor mymaster 172.28.0.10 6379 2

# Si le master ne répond pas pendant 5s, il est considéré en panne.
sentinel down-after-milliseconds mymaster 5000

# Temps max pour terminer un failover.
sentinel failover-timeout mymaster 60000

# Nombre de replicas synchronisés en parallèle après un failover.

# Generated by CONFIG REWRITE
dir "/data"
latency-tracking-info-percentiles 50 99 99.9
user default on nopass sanitize-payload ~* &* +@all
sentinel myid b52cfe8a0fcc8ea599ce541d07de3721ba717e85
sentinel config-epoch mymaster 23
sentinel leader-epoch mymaster 23
sentinel current-epoch 23

sentinel known-replica mymaster 172.28.0.12 6379

sentinel known-replica mymaster 172.28.0.11 6379

sentinel known-sentinel mymaster 172.28.0.8 26379 dd8968cc9a8dd73c70d3d7e2506693cfff7907e9

sentinel known-sentinel mymaster 172.28.0.9 26379 adce13a975cd16ecfc7dfccca49c44553fa59aaa

sentinel known-sentinel mymaster 172.28.0.7 26379 b52cfe8a0fcc8ea599ce541d07de3721ba717e85

