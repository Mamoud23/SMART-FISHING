version: "3.9"

# Sandbox de TEST pour valider le pipeline capteur -> MQTT -> Node-RED -> API.
# Complètement séparé du docker-compose.yml principal (aucune modification
# dessus) : ce fichier se contente de rejoindre le même réseau Docker.
#
# Lancer avec :
#   docker compose -f docker-compose.iot-test.yml up -d

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: iot_mosquitto
    ports:
      - "1883:1883"
    volumes:
      - "C:/Users/dyaco/SMART-FISHING/broker/mosquitto_vuln.conf:/mosquitto/config/mosquitto.conf"
    networks:
      - smart_fishing_net

  node-red:
    image: nodered/node-red:3.1
    container_name: iot_node_red
    user: "0:0"          # ← Ajoute cette ligne
    ports:
      - "1880:1880"
    volumes:
      - ./node-red-data:/data
    depends_on:
      - mosquitto
    networks:
      - smart_fishing_net

networks:
  smart_fishing_net:
    external: true
    name: api_smart_fishing_net   # ⚠️ vérifie ce nom exact avec `docker network ls`